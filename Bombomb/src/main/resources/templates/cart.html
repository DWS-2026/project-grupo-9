<!DOCTYPE html>
<html>

<body class="d-flex flex-column min-vh-100">
    <main class="flex-grow-1">
        {{>navigationBar}}
        {{#order}}

        <div class="cart">
            <div class="row">
                <div class="first-block">
                    <div class="title-cart">
                        <h4><b>Mi Cesta</b></h4>
                        <p>2 productos</p>
                    </div>
                    <div class="products">
                        {{#products}}
                        <div class="first-product">
                            <div class="info-product-group">
                                <div class="button-image-product">
                                    <img class="image-product" src="/product/{{id}}/image">
                                </div>
                                <div class="col">
                                    <div class="type-product">Caja</div>
                                    <div class="name-product">{{name}}</div>
                                </div>
                            </div>
                            <div class="right-control">
                                <div class="col-price">
                                    <div class="price">{{price}}</div>
                                </div>

                            </div>
                        </div>
                        {{/products}}
                    </div>
                </div>
                <div class="second-block">
                    <div class="info-second-block">
                        <div>
                            <h5><b>Total</b></h5>
                        </div>
                        <hr>
                        <div class="row-second-block">
                            <div class="col" style="padding-left: 0;">PRODUCTOS 2</div>
                            <div class="col text-right">1.20&euro;</div>
                        </div>
                        <div class="container px-4 px-lg-5">
                            <a href="/payment" class="btn btn-pay"><span>Proceder con el pago</span></a>

                        </div>
                    </div>
                </div>

            </div>
        </div>

        {{/order}}
    </main>
    {{>footer}}

</body>

</html>
