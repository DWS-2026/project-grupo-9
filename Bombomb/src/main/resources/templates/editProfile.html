<!DOCTYPE html>
<html>

<body class="d-flex flex-column min-vh-100">
    <main class="flex-grow-1">
        {{>navigationBar}}
        <div class="d-flex justify-content-center mt-5 mx-5">
            <div class="card mb-4 px-lg-4 py-5">
                <h1>Editar perfil</h1>
                <form class="row g-3" method="post" action="/editprofile" enctype="multipart/form-data">
                    {{#user}}
                    <div class="col-md-4">
                        <label for="name" class="form-label">Nombre</label>
                        <input class="form-control text-center me-3" id="input" type="text" name="name" value="{{name}}" style="max-width: 20rem" required/>
                    </div>
                    <div class="col-md-8">
                        <label for="surname" class="form-label">Apellidos</label>
                        <input class="form-control text-center me-3" id="input" type="text" name="surname" value="{{surname}}" style="max-width: 20rem" required/>
                    </div>
                    <div class="col-md-4">
                        <label for="telephone" class="form-label">Teléfono</label>
                        <input class="form-control text-center me-3" id="input" type="text" name="telephone" value="{{telephone}}" style="max-width: 20rem" required/>
                    </div>
                   
                    
                    <div class="col-md-4 mt-4">
                        
                            <div class="form-group">
                                <label for="profilePicture">Foto de perfil</label>
                                 <div class="card-body text-center">
                                <img src="/profile/image"
                                    alt="avatar" class="rounded-circle img-fluid" style="width: 150px;">
                            </div>
                                <input type="file" class="form-control-file" name="imageFile" id="profilePicture">
                            </div>
                        
                    </div>
                    <input type="hidden" name="_csrf" value="{{token}}"/>
                    {{/user}}
                   <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary">
                        Guardar cambios
                    </button>
                        <a href="/profile"  class="btn btn-primary">Perfil</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    {{>footer}}


</body>

</html>
